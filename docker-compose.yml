services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  model-mock:
    image: ghcr.io/mendableai/fireworks-mock:latest
    profiles: ["mock"]
    ports:
      - "11434:8080"

volumes:
  postgres-data:
